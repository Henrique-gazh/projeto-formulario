<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="estilo/style.css" media="all">
    
    <link rel="stylesheet" href="estilo/telagrande.css" media="screen and (min-width: 769px)">
    
    <link rel="stylesheet" href="estilo/tablet.css" media="screen and (max-width: 768px)">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">   
            </div>
            <div id="form"> 
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder gerenciar seu ambiente.</p>
                <form action="" method="post" autocomplete="on">
                    
                    <div id="email" class="campo">
                        <span class="material-icons">person</span>
                        <label for="inome"></label>
                        <input type="text" name="nome" id="inome" required autocomplete="username" placeholder="seu e-mail">
                    </div>
                    
                    <div id="senha" class="campo">
                        <span class="material-icons">vpn_key</span>
                        <label for="isenha"></label>
                        <input type="password" name="senha" id="isenha" minlength="8" required autocomplete="current-password" placeholder="sua senha">
                    </div>
                    
                    <div id="saida">
                        <input type="submit" value="Entrar">
                        <a href="#" class="botao-esqueci">Esqueci a senha</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
